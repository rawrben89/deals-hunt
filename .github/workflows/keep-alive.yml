name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -sf --max-time 30 https://deals-hunt.onrender.com/api/status || echo "unreachable")
          echo "Response: $STATUS"
