<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1565C0">
<meta name="description" content="Live price drops and sales from Quebec & Ontario Canadian retailers">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deals">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>QC & ON Deals — Live</title>
<style>
:root {
  --qc:#1565C0; --on:#c62828; --bg:#f2f4f7; --card:#fff;
  --border:#e2e5eb; --text:#1a1a2e; --muted:#6b7280;
  --green:#2e7d32; --radius:14px; --sidebar-w:210px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}

/* ── Header ── */
header{background:linear-gradient(135deg,var(--qc) 0%,#0d47a1 42%,#b71c1c 58%,var(--on) 100%);color:#fff;padding:22px 16px 18px;text-align:center}
header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
header p{font-size:.82rem;opacity:.88;margin-bottom:10px}
.live-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:.72rem}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ef5350;animation:livePulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
#fetchStatus{opacity:.8}

/* ── Page layout ── */
.page-layout{display:flex;align-items:flex-start}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:#fff;border-right:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto;z-index:90}
.sidebar-hd{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:12px 14px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff}

/* All-stores row */
.store-item-all{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:.84rem;font-weight:600;color:var(--text);transition:background .12s;border-left:3px solid transparent;border-bottom:1px solid var(--border)}
.store-item-all:hover{background:var(--bg)}
.store-item-all.active{background:#e3f2fd;color:var(--qc);font-weight:700;border-left-color:var(--qc)}
.store-item-all.active .sic{background:var(--qc);color:#fff}

/* Category header */
.cat-header{display:flex;align-items:center;gap:7px;padding:8px 14px 8px 12px;cursor:pointer;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:#f8f9fb;border-bottom:1px solid var(--border);user-select:none;transition:background .12s}
.cat-header:hover{background:#eef0f4}
.cat-name{flex:1}
.cat-total{font-size:.67rem;background:#e2e5eb;border-radius:99px;padding:1px 6px;font-weight:700;flex-shrink:0}
.cat-arrow{font-size:.65rem;transition:transform .18s;flex-shrink:0}
.cat-header.open .cat-arrow{transform:rotate(90deg)}

/* Store rows inside a category */
.cat-stores{display:none}
.cat-stores.open{display:block}
.store-item{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 28px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text);transition:background .12s;border-left:3px solid transparent}
.store-item:hover{background:var(--bg)}
.store-item.active{background:#e3f2fd;color:var(--qc);font-weight:700;border-left-color:var(--qc)}
.store-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.store-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sic{font-size:.68rem;background:var(--bg);border-radius:99px;padding:1px 6px;color:var(--muted);font-weight:700;flex-shrink:0}
.store-item.active .sic{background:var(--qc);color:#fff}

/* ── Main content ── */
.main-content{flex:1;min-width:0}

/* ── Controls ── */
.controls{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:80;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.search-row{display:flex;gap:8px;max-width:640px;margin:0 auto 8px}
#searchInput{width:100%;display:block;padding:9px 14px;border:2px solid var(--border);border-radius:10px;font-size:.9rem;transition:border-color .2s;min-width:0;box-sizing:border-box}
#searchInput:focus{outline:none;border-color:var(--qc)}
#searchInput.dropdown-open{border-radius:10px 10px 0 0;border-bottom-color:transparent}
#refreshBtn{padding:9px 14px;background:var(--qc);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:700;white-space:nowrap;transition:background .2s;flex-shrink:0}
#refreshBtn:hover{background:#0d47a1}
#refreshBtn:disabled{background:#90caf9;cursor:default}

/* category filters */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:0}
.fbtn{padding:4px 11px;border:1.5px solid var(--border);border-radius:99px;background:#fff;cursor:pointer;font-size:.75rem;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--qc);color:var(--qc)}
.fbtn.active{background:var(--qc);border-color:var(--qc);color:#fff}

/* ── Stats + page-size bar ── */
.bottom-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--bg);flex-wrap:wrap;gap:6px}
#statsBar{font-size:.78rem;color:var(--muted)}
.pgsize-row{display:flex;align-items:center;gap:4px}
.pgsize-label{font-size:.72rem;color:var(--muted);margin-right:2px}
.pgbtn{padding:3px 9px;border:1.5px solid var(--border);border-radius:99px;background:#fff;cursor:pointer;font-size:.72rem;font-weight:600;color:var(--muted);transition:all .15s}
.pgbtn:hover{border-color:var(--qc);color:var(--qc)}
.pgbtn.active{background:var(--qc);border-color:var(--qc);color:#fff}

#lastUpdated{font-size:.68rem;text-align:center;color:#bbb;padding:2px 14px}

/* ── Grid ── */
.deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;padding:12px 14px 36px;max-width:1400px;margin:0 auto}

/* ── Card ── */
.deal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.deal-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.10)}
.deal-card.is-new{animation:popIn .45s ease-out}
@keyframes popIn{0%{opacity:0;transform:scale(.94)}100%{opacity:1;transform:scale(1)}}

.card-top{padding:9px 12px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);gap:6px}
.store-label{font-size:.68rem;font-weight:800;color:#fff;padding:2px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}

/* store label — background set via JS inline style */
.store-label{background:var(--qc)}

.card-meta{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rel-tag{font-size:.65rem;color:var(--muted);white-space:nowrap}
.src-badge{font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:99px;letter-spacing:.2px}
.src-badge.wm{background:#e3f2fd;color:#0071CE;border:1px solid #90caf9}
.src-badge.st{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.src-badge.rfd{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.src-badge.flipp{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.clearance-tag{font-size:.62rem;font-weight:800;color:#fff;background:#e65100;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.3px}
.date-tag{font-size:.65rem;color:var(--muted);margin-top:4px}

.deal-img{width:100%;height:140px;object-fit:contain;background:#f8f9fa;border-bottom:1px solid var(--border);padding:8px}
.card-body{padding:11px 12px;flex:1}
.deal-title{font-size:.86rem;font-weight:600;line-height:1.45;color:var(--text);margin-bottom:6px}
.price-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.price-now{font-size:1.05rem;font-weight:800;color:var(--on)}
.price-was{font-size:.78rem;color:#999;text-decoration:line-through}
.save-badge{font-size:.65rem;font-weight:800;color:#fff;background:var(--green);padding:2px 6px;border-radius:99px}
.savings-label{font-size:.7rem;color:var(--green);font-weight:600;margin-top:2px}

.card-foot{padding:8px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.province-tags{display:flex;gap:4px}
.ptag{font-size:.62rem;font-weight:800;padding:2px 7px;border-radius:99px}
.ptag.qc{background:#e3f2fd;color:var(--qc);border:1px solid #90caf9}
.ptag.on{background:#ffebee;color:var(--on);border:1px solid #ef9a9a}
.view-btn{font-size:.76rem;color:var(--qc);text-decoration:none;font-weight:700;padding:5px 11px;border:1.5px solid var(--qc);border-radius:8px;transition:all .15s;white-space:nowrap}
.view-btn:hover{background:var(--qc);color:#fff}
.view-btn.dim{opacity:.3;cursor:default;pointer-events:none}
.view-btn.search-btn{color:#777;border-color:#bbb}
.view-btn.search-btn:hover{background:#777;color:#fff;border-color:#777}

/* ── Load more ── */
#loadMoreRow{text-align:center;padding:12px 14px 28px}
#loadMoreBtn{padding:10px 28px;background:#fff;color:var(--qc);border:2px solid var(--qc);border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .2s}
#loadMoreBtn:hover{background:var(--qc);color:#fff}

/* ── State boxes ── */
.state-box{grid-column:1/-1;text-align:center;padding:50px 20px}
.spinner{display:inline-block;width:38px;height:38px;border:4px solid #e0e0e0;border-top-color:var(--qc);border-radius:50%;animation:spin .75s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box h2{font-size:1rem;margin-bottom:5px}
.state-box p{font-size:.82rem;color:var(--muted)}
.retry-btn{margin-top:14px;padding:9px 24px;background:var(--qc);color:#fff;border:none;border-radius:10px;font-size:.88rem;cursor:pointer;font-weight:700}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(90px);background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:12px;font-size:.84rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;transition:transform .35s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
.toast-act{color:#90caf9;margin-left:10px;cursor:pointer;text-decoration:underline}

/* ── Footer ── */
footer{text-align:center;padding:16px;font-size:.73rem;color:var(--muted);border-top:1px solid var(--border);background:#fff}
footer a{color:var(--qc)}

/* ── Province toggle ── */
.province-row{display:flex;gap:4px;justify-content:center;margin-top:6px}
.provbtn{padding:4px 13px;border:1.5px solid var(--border);border-radius:99px;background:#fff;cursor:pointer;font-size:.74rem;font-weight:700;color:var(--muted);transition:all .15s}
.provbtn:hover{border-color:var(--qc);color:var(--qc)}
.provbtn.active-qc{background:var(--qc);border-color:var(--qc);color:#fff}
.provbtn.active-on{background:var(--on);border-color:var(--on);color:#fff}
.provbtn.active-both{background:#555;border-color:#555;color:#fff}

/* ── All-time low badge ── */
.low-badge{font-size:.58rem;font-weight:800;color:#fff;background:#6a1b9a;padding:2px 6px;border-radius:99px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}

/* ── Expiry badge ── */
.expiry-tag{font-size:.63rem;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
.expiry-tag.urgent{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.expiry-tag.soon{background:#fff8e1;color:#e65100;border:1px solid #ffcc80}
.expiry-tag.ok{color:var(--muted);font-size:.62rem;font-weight:400}

/* ── New deals tab ── */
.fbtn.new-btn{border-color:#6a1b9a;color:#6a1b9a}
.fbtn.new-btn.active{background:#6a1b9a;border-color:#6a1b9a;color:#fff}
.new-count{font-weight:800}

/* ── Search autocomplete ── */
.search-wrap{position:relative;flex:1;min-width:0}
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.1);display:none}
.search-dropdown.open{display:block}
.sdrop-item{padding:8px 14px;font-size:.84rem;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sdrop-item:last-child{border-bottom:none}
.sdrop-item:hover{background:var(--bg)}
.sdrop-icon{font-size:.7rem;color:var(--muted);flex-shrink:0}
.sdrop-label{flex:1}
.sdrop-type{font-size:.67rem;color:var(--muted)}

/* ── Dark mode ── */
[data-theme="dark"]{--bg:#111827;--card:#1e2a40;--border:#2a3a5c;--text:#dde4f5;--muted:#7986b0;--green:#4caf50}
[data-theme="dark"] .sidebar,[data-theme="dark"] .sidebar-hd{background:#16213e;border-color:var(--border)}
[data-theme="dark"] .controls{background:#16213e;border-color:var(--border)}
[data-theme="dark"] .bottom-bar{background:#111827}
[data-theme="dark"] .cat-header{background:#1a2740;color:var(--muted)}
[data-theme="dark"] .cat-header:hover,[data-theme="dark"] .store-item:hover,[data-theme="dark"] .store-item-all:hover{background:#1a2f50}
[data-theme="dark"] #searchInput{background:var(--card);color:var(--text);border-color:var(--border)}
[data-theme="dark"] .fbtn{background:var(--card);border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .fbtn.active{background:var(--qc);border-color:var(--qc);color:#fff}
[data-theme="dark"] .pgbtn{background:var(--card);border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .pgbtn.active{background:var(--qc);border-color:var(--qc);color:#fff}
[data-theme="dark"] .provbtn{background:var(--card);border-color:var(--border);color:var(--muted)}
[data-theme="dark"] .search-dropdown{background:var(--card);border-color:var(--border)}
[data-theme="dark"] .sdrop-item:hover{background:#1a2f50}
[data-theme="dark"] footer{background:#16213e}
[data-theme="dark"] #loadMoreBtn{background:var(--card);color:var(--qc)}
[data-theme="dark"] .store-item-all.active{background:#1a3a6a}
[data-theme="dark"] .store-item.active{background:#1a3a6a}

/* ── Theme toggle button ── */
.theme-btn{padding:4px 10px;border:1.5px solid rgba(255,255,255,.5);border-radius:99px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:.78rem;font-weight:700;transition:background .15s;margin-left:10px}
.theme-btn:hover{background:rgba(255,255,255,.28)}

/* ── Wishlist heart ── */
.heart-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:3px 4px;opacity:.3;transition:opacity .15s,transform .15s;line-height:1;flex-shrink:0}
.heart-btn:hover{opacity:.7}
.heart-btn.saved{opacity:1;color:#e91e63}
.heart-btn.saved:hover{transform:scale(1.18)}
.fbtn.saved-btn{border-color:#e91e63;color:#e91e63}
.fbtn.saved-btn.active{background:#e91e63;border-color:#e91e63;color:#fff}

/* ── Alert bell ── */
.alert-btn{background:none;border:none;cursor:pointer;font-size:.82rem;padding:3px 4px;opacity:.3;transition:opacity .15s;line-height:1;flex-shrink:0}
.alert-btn:hover{opacity:1}

/* ── Card actions group ── */
.card-actions{display:flex;align-items:center;gap:3px}

/* ── Sparkline ── */
.sparkline-wrap{height:32px;margin-top:8px}
.sparkline-svg{width:100%;height:100%;overflow:visible}

/* ── Price alert modal ── */
#alertModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;align-items:center;justify-content:center}
#alertModal.open{display:flex}
.modal-box{background:var(--card);color:var(--text);border-radius:16px;padding:24px;width:min(360px,92vw);box-shadow:0 24px 64px rgba(0,0,0,.35)}
.modal-title{font-size:1rem;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:.78rem;color:var(--muted);margin-bottom:16px;line-height:1.5;word-break:break-word}
.modal-label{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:4px;display:block}
.modal-inp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;margin-bottom:12px;box-sizing:border-box;background:var(--bg);color:var(--text)}
.modal-inp:focus{outline:none;border-color:var(--qc)}
.modal-row{display:flex;gap:8px;margin-top:4px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .15s}
.modal-btn.primary{background:var(--qc);color:#fff}
.modal-btn.cancel{background:var(--border);color:var(--muted)}
.modal-btn.primary:hover{background:#0d47a1}

/* ── Mobile ── */
@media(max-width:768px){
  .page-layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-hd{position:static;padding:6px 12px 4px}
  #storeList{display:flex;overflow-x:auto;padding:4px 10px 8px;gap:5px;scrollbar-width:none;align-items:center}
  #storeList::-webkit-scrollbar{display:none}
  /* flatten accordion on mobile */
  .cat-group{display:contents}
  .cat-header{display:none}
  .cat-stores{display:contents !important}
  .store-item-all,.store-item{
    flex-shrink:0;padding:4px 11px;border:1.5px solid var(--border);
    border-radius:99px;font-size:.73rem;white-space:nowrap;
    border-left:1.5px solid var(--border);background:#fff
  }
  .store-item-all.active,.store-item.active{
    background:var(--qc);border-color:var(--qc);color:#fff;border-left-color:var(--qc)
  }
  .store-item-all.active .sic,.store-item.active .sic{display:none}
  .store-dot{display:none}
  .sic{display:none}
  .deals-grid{grid-template-columns:1fr 1fr;gap:10px;padding:10px 10px 28px}
  .deal-img{height:110px}
  .deal-title{font-size:.78rem}
  .price-now{font-size:.95rem}
  .view-btn{font-size:.7rem;padding:4px 9px}
}
@media(max-width:400px){
  .deals-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>🍁 Quebec & Ontario Deals</h1>
  <p>Live price drops &amp; sales from Canadian retailers</p>
  <div class="live-row">
    <span class="live-dot"></span>
    <span id="fetchStatus">Connecting…</span>
    <button class="theme-btn" id="themeBtn" onclick="toggleDark()">🌙</button>
  </div>
</header>

<div class="page-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-hd">Stores</div>
    <div id="storeList"></div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- CONTROLS -->
    <div class="controls">
      <div class="search-row">
        <div class="search-wrap">
          <input type="search" id="searchInput" placeholder='Search deals, brands, stores…' autocomplete="off">
          <div id="searchDropdown" class="search-dropdown"></div>
        </div>
        <button id="refreshBtn" onclick="manualRefresh()">⟳ Refresh</button>
      </div>
      <div class="filter-row" id="catFilters">
        <button class="fbtn active" data-cat="all">All</button>
        <button class="fbtn new-btn" id="newDealsBtn" data-cat="new" style="display:none">New <span class="new-count" id="newCount">0</span></button>
        <button class="fbtn saved-btn" data-cat="saved" id="savedDealsBtn">♥ Saved <span id="savedCount"></span></button>
        <button class="fbtn" data-cat="electronics">Electronics</button>
        <button class="fbtn" data-cat="home">Home &amp; Tools</button>
        <button class="fbtn" data-cat="fashion">Fashion</button>
        <button class="fbtn" data-cat="sports">Sports</button>
        <button class="fbtn" data-cat="toys">Toys</button>
        <button class="fbtn" data-cat="office">Office</button>
        <button class="fbtn" data-cat="auto">Auto</button>
        <button class="fbtn" data-cat="health">Health &amp; Beauty</button>
        <button class="fbtn" data-cat="food">Food</button>
      </div>
      <div class="province-row">
        <button class="provbtn" data-prov="QC">QC Only</button>
        <button class="provbtn active-both" data-prov="both">QC + ON</button>
        <button class="provbtn" data-prov="ON">ON Only</button>
      </div>
    </div>

    <!-- STATS + PAGE SIZE -->
    <div class="bottom-bar">
      <div id="statsBar">Loading…</div>
      <div class="pgsize-row">
        <span class="pgsize-label">Sort:</span>
        <button class="pgbtn active" data-sort="default">Default</button>
        <button class="pgbtn" data-sort="price-asc">$ Low→High</button>
        <button class="pgbtn" data-sort="price-desc">$ High→Low</button>

function detectCat(d) {
  if (d.category) {
    const lc = d.category.toLowerCase();
    if (/electron|comput|tv|phone|tablet|printer|ink|camera/i.test(lc)) return 'electronics';
    if (/furniture|appliance|kitchen|garden|tool|home|hardware|decor/i.test(lc)) return 'home';
    if (/cloth|apparel|shoe|fashion|wear|access/i.test(lc)) return 'fashion';
    if (/sport|outdoor|fitness|bike|camp|exercise/i.test(lc)) return 'sports';
    if (/toy|baby|child|game board|infant/i.test(lc)) return 'toys';
    if (/office|supply|stationery/i.test(lc)) return 'office';
    if (/auto|tire|vehicle|car|motor/i.test(lc)) return 'auto';
    if (/health|beauty|vitamin|pharma|personal care|cosmetic/i.test(lc)) return 'health';
    if (/food|grocery|beverage|snack/i.test(lc)) return 'food';
  }
  const text = (d.title + ' ' + (d.store||'')).toLowerCase();
  for (const [cat, kws] of Object.entries(CAT_KW))
    if (kws.some(kw => text.includes(kw))) return cat;
  return 'other';
}

async function loadDeals(spinner=true) {
  if (spinner) showLoading();
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='⟳ Loading…';
  try {
    const res = await fetch(API_BASE+'/api/deals');
    if (res.status === 503) {
      document.getElementById('fetchStatus').textContent = 'Fetching from sources, please wait…';
      setTimeout(() => loadDeals(false), 3000);
      return;
    }
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (!data.deals?.length) throw new Error('No deals returned');

    allDeals = data.deals.map(d=>({...d, _cat:detectCat(d), _isNew:false}));
    // On first load, mark all as seen (no "new" badge)
    if(seenTids.size===0) data.deals.forEach(d=>seenTids.add(d.tid));
    newTidSet.clear();
    updateNewBtn();

    document.getElementById('fetchStatus').textContent =
      `${data.count} deals · updated ${fmtTime(data.fetched)}`;
    document.getElementById('lastUpdated').textContent = '';

    mergeStoreCounts(data.storeCounts, data.deals);
    buildStoreList(cumulativeStoreCounts);
    buildAutocomplete();
    applyFilters();
  } catch(e) {
    console.error(e);
    showError(e.message);
  } finally {
    btn.disabled=false; btn.textContent='⟳ Refresh';
  }
}

function manualRefresh(){loadDeals(false)}

/* ══════════════════════════════════════
   SSE
══════════════════════════════════════ */
function connectSSE(){
  const es=new EventSource(API_BASE+'/api/events');
  es.onmessage=e=>{
    try{
      const msg=JSON.parse(e.data);
      if(msg.type==='update'){
        fetch(API_BASE+'/api/deals').then(r=>r.json()).then(data=>{
          if(!data.deals?.length) return;
          // Track which deals are genuinely new since last fetch
          const brandNew=data.deals.filter(d=>!seenTids.has(d.tid));
          data.deals.forEach(d=>seenTids.add(d.tid));
          brandNew.forEach(d=>newTidSet.add(d.tid));
          allDeals=data.deals.map(d=>({...d,_cat:detectCat(d),_isNew:newTidSet.has(d.tid)}));
          document.getElementById('fetchStatus').textContent=
            `${data.count} deals · updated ${fmtTime(data.fetched)}`;
          document.getElementById('lastUpdated').textContent='';
          mergeStoreCounts(data.storeCounts, data.deals);
          buildStoreList(cumulativeStoreCounts);
          buildAutocomplete();
          updateNewBtn();
          applyFilters(brandNew.map(d=>d.tid));
          if(brandNew.length)
            showToast(`${brandNew.length} new deal${brandNew.length>1?'s':''} found!`,
              'View new', ()=>{ activeCat='new'; setActiveCatBtn('new'); applyFilters(); });
        }).catch(()=>{});
      }
    }catch(_){}
  };
  es.onerror=()=>{es.close();setTimeout(connectSSE,30000)};
}

/* ══════════════════════════════════════
   Sidebar — category accordion
══════════════════════════════════════ */
function mergeStoreCounts(fresh, deals){
  for(const [store,cnt] of Object.entries(fresh)){
    const s=store.trim();
    cumulativeStoreCounts[s]=Math.max(cumulativeStoreCounts[s]||0, cnt);
  }
  // Build store→category from deal storeCategory field (server-authoritative)
  if(deals){
    for(const d of deals){
      const s=(d.store||'').trim();
      if(s && d.storeCategory) storeCategoryMap[s]=d.storeCategory;
    }
  }
}

function buildStoreList(counts){
  const list=document.getElementById('storeList');

  // Save which categories are currently open
  const openCats=new Set();
  list.querySelectorAll('.cat-header.open').forEach(h=>openCats.add(h.dataset.cat));

  const total=Object.values(counts).reduce((s,c)=>s+c,0);

  // Group stores by category using server-provided mapping, fall back to STORE_CAT
  const groups={};
  for(const [store,cnt] of Object.entries(counts)){
    if(!cnt) continue;
    const cat=storeCategoryMap[store.trim()]||STORE_CAT[store.trim()]||'Other';
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push([store.trim(),cnt]);
  }
  for(const cat in groups) groups[cat].sort((a,b)=>b[1]-a[1]);

  // "All stores" row at top
  let html=`<div class="store-item-all ${activeStore==='all'?'active':''}" data-store="all">
    <span class="store-dot" style="background:#555"></span>
    <span class="store-item-name" style="flex:1">All Stores</span>
    <span class="sic">${total}</span>
  </div>`;

  // Categories in order
  const rendered=new Set();
  const orderedCats=[...CAT_ORDER.filter(c=>groups[c]),
                     ...Object.keys(groups).filter(c=>!CAT_ORDER.includes(c))];

  for(const cat of orderedCats){
    const stores=groups[cat]||[];
    if(!stores.length) continue;
    rendered.add(cat);
    const catTotal=stores.reduce((s,[,c])=>s+c,0);
    const isOpen=openCats.has(cat)||stores.some(([s])=>s===activeStore);

    html+=`<div class="cat-group">
      <div class="cat-header ${isOpen?'open':''}" data-cat="${esc(cat)}">
        <span class="cat-name">${esc(cat)}</span>
        <span class="cat-total">${catTotal}</span>
        <span class="cat-arrow">›</span>
      </div>
      <div class="cat-stores ${isOpen?'open':''}">`;

    for(const [store,cnt] of stores){
      html+=`<div class="store-item ${activeStore===store?'active':''}" data-store="${esc(store)}">
        <span class="store-dot" style="background:${storeColor(store)}"></span>
        <span class="store-item-name">${esc(store)}</span>
        <span class="sic">${cnt}</span>
      </div>`;
    }
    html+=`</div></div>`;
  }

  list.innerHTML=html;

  // Category toggle
  list.querySelectorAll('.cat-header').forEach(hdr=>{
    hdr.onclick=()=>{
      hdr.classList.toggle('open');
      hdr.nextElementSibling.classList.toggle('open');
    };
  });

  // Store click (all-stores row + individual rows)
  list.querySelectorAll('.store-item-all,.store-item').forEach(item=>{
    item.onclick=e=>{
      e.stopPropagation();
      activeStore=item.dataset.store;
      list.querySelectorAll('.store-item-all,.store-item').forEach(i=>i.classList.remove('active'));
      item.classList.add('active');
      applyFilters();
    };
  });
}

/* ══════════════════════════════════════
   Filter + render
══════════════════════════════════════ */
function parsePrice(s){
  if(!s) return null;
  const m=(s+'').match(/[\d]+\.?\d*/);
  return m?parseFloat(m[0]):null;
}

function applyFilters(newTids=[]){
  const q=searchQ.toLowerCase();
  filtered=allDeals;
  // Province filter
  if(activeProvince!=='both')
    filtered=filtered.filter(d=>(d.provinces||['QC','ON']).includes(activeProvince));
  if(activeStore!=='all') filtered=filtered.filter(d=>d.store.trim()===activeStore);
  if(activeCat==='new')        filtered=filtered.filter(d=>d._isNew);
  else if(activeCat==='saved') filtered=filtered.filter(d=>savedTids.has(d.tid));
  else if(activeCat!=='all')   filtered=filtered.filter(d=>d._cat===activeCat);
  if(q) filtered=filtered.filter(d=>
    d.title.toLowerCase().includes(q)||
    (d.store||'').toLowerCase().includes(q)||
    (d.brand||'').toLowerCase().includes(q)
  );

  if(sortBy==='price-asc'){
    filtered=[...filtered].sort((a,b)=>(parsePrice(a.currentPrice)??Infinity)-(parsePrice(b.currentPrice)??Infinity));
  } else if(sortBy==='price-desc'){
    filtered=[...filtered].sort((a,b)=>(parsePrice(b.currentPrice)??-1)-(parsePrice(a.currentPrice)??-1));
  } else if(sortBy==='savings-desc'){
    filtered=[...filtered].sort((a,b)=>{
      const sa=(parsePrice(a.currentPrice)&&parsePrice(a.originalPrice))?(parsePrice(a.originalPrice)-parsePrice(a.currentPrice)):0;
      const sb=(parsePrice(b.currentPrice)&&parsePrice(b.originalPrice))?(parsePrice(b.originalPrice)-parsePrice(b.currentPrice)):0;
      return sb-sa;
    });
  } else if(sortBy==='pct-desc'){
    filtered=[...filtered].sort((a,b)=>(parseFloat(b.savePct)||0)-(parseFloat(a.savePct)||0));
  }

  shown = pageSize===0 ? filtered.length : Math.min(pageSize, filtered.length);
  renderDeals(newTids);
}

function renderDeals(newTids=[]){
  const stats=document.getElementById('statsBar');
  const provLabel=activeProvince==='both'?'Quebec & Ontario':activeProvince==='QC'?'Quebec':'Ontario';
  stats.textContent=`${filtered.length} deal${filtered.length!==1?'s':''} — ${provLabel}`;

  const root=document.getElementById('root');
  const lmRow=document.getElementById('loadMoreRow');

  if(!filtered.length){
    root.innerHTML=`<div class="deals-grid"><div class="state-box">
      <h2>No deals found</h2><p>Clear filters or try a different search.</p>
    </div></div>`;
    lmRow.style.display='none';
    return;
  }

  const visible=filtered.slice(0,shown);
  root.innerHTML=`<div class="deals-grid">${visible.map(d=>cardHtml(d,newTids)).join('')}</div>`;

  if(shown<filtered.length){
    lmRow.style.display='block';
    document.getElementById('loadMoreBtn').textContent=
      `Load more (${shown} of ${filtered.length}) ↓`;
  }else{
    lmRow.style.display='none';
  }
}

function loadMore(){
  const step=pageSize===0?60:pageSize;
  shown=Math.min(shown+step, filtered.length);
  renderDeals();
}

/* ══════════════════════════════════════
   Card HTML
══════════════════════════════════════ */
function cardHtml(d, newTids=[]){
  const isNew=newTids.includes(d.tid);
  const srcBadge=d.source==='Walmart'
    ?'<span class="src-badge wm">Walmart</span>'
    :d.source==='RedFlagDeals'
    ?'<span class="src-badge rfd">RFD</span>'
    :d.source==='Flipp'
    ?'<span class="src-badge flipp"></span>'
    :'';

  const clearanceBadge=d.clearance?'<span class="clearance-tag">Clearance</span>':'';

  const img=d.img
    ?`<img class="deal-img" src="${esc(d.img)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    :'';

  let priceHtml='';
  if(d.currentPrice){
    priceHtml=`<div class="price-row">
      <span class="price-now">${esc(d.currentPrice)}</span>
      ${d.originalPrice?`<span class="price-was">${esc(d.originalPrice)}</span>`:''}
      ${d.savePct?`<span class="save-badge">-${esc(d.savePct)}</span>`:''}
    </div>
    ${d.savings?`<div class="savings-label">${esc(d.savings)}</div>`:''}`;
  }

  const relTag=d.relTime?`<span class="rel-tag">${esc(d.relTime)}</span>`:'';

  // Expiry countdown
  let expiryTag='';
  if(d.validUntil){
    const daysLeft=Math.ceil((new Date(d.validUntil)-new Date())/(1000*60*60*24));
    if(daysLeft<=0)       expiryTag=`<span class="expiry-tag urgent">Expires today</span>`;
    else if(daysLeft===1) expiryTag=`<span class="expiry-tag urgent">Expires tomorrow</span>`;
    else if(daysLeft<=3)  expiryTag=`<span class="expiry-tag soon">Expires in ${daysLeft} days</span>`;
    else                  expiryTag=`<span class="expiry-tag ok">Until ${fmtDate(d.validUntil)}</span>`;
  }else if(d.dropDate){
    expiryTag=`<span class="expiry-tag ok">Posted ${fmtDate(d.dropDate)}</span>`;
  }

  // All-time low badge
  const lowBadge=d.isLowest?`<span class="low-badge">Lowest Price</span>`:'';

  let viewBtn='';
  if(d.source!=='Flipp' && d.link){
    viewBtn=`<a class="view-btn" href="${esc(d.link)}" target="_blank" rel="noopener noreferrer">View →</a>`;
  } else if(d.source==='Flipp'){
    const searchUrl=flippSearchUrl(d.store, d.title);
    if(searchUrl) viewBtn=`<a class="view-btn search-btn" href="${esc(searchUrl)}" target="_blank" rel="noopener noreferrer">Search →</a>`;
  }

  const tid_esc=esc(d.tid);
  const heartBtn=`<button class="heart-btn${savedTids.has(d.tid)?' saved':''}" data-tid="${tid_esc}" title="${savedTids.has(d.tid)?'Remove from saved':'Save deal'}">♥</button>`;
  const alertBtn=`<button class="alert-btn" data-tid="${tid_esc}" title="Set price alert">🔔</button>`;

  return `
<div class="deal-card${isNew?' is-new':''}">
  <div class="card-top">
    <span class="store-label" style="background:${storeColor(d.store)}">${esc(d.store)}</span>
    <div class="card-meta">${clearanceBadge}${lowBadge}${srcBadge}${relTag}</div>
  </div>
  ${img}
  <div class="card-body">
    <div class="deal-title">${esc(d.title)}</div>
    ${priceHtml}
    ${expiryTag?`<div class="date-tag">${expiryTag}</div>`:''}
    <div class="sparkline-wrap" data-tid="${tid_esc}"></div>
  </div>
  <div class="card-foot">
    <div class="province-tags">
      ${(d.provinces||['QC','ON']).includes('QC')?'<span class="ptag qc">QC</span>':''}
      ${(d.provinces||['QC','ON']).includes('ON')?'<span class="ptag on">ON</span>':''}
    </div>
    <div class="card-actions">${heartBtn}${alertBtn}${viewBtn}</div>
  </div>
</div>`;
}

let _tt;
function showToast(msg,actLabel,actFn){
  const t=document.getElementById('toast');
  const act=actLabel?`<span class="toast-act" id="toast-act">${esc(actLabel)}</span>`:'';
  t.innerHTML=msg+act;
  if(actFn) t.querySelector('#toast-act')?.addEventListener('click',actFn);

  _tt=setTimeout(()=>t.classList.remove('show'),5000);
}

/* ══════════════════════════════════════
   Helpers
══════════════════════════════════════ */
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(iso){
  if(!iso) return '';
  try{return new Date(iso).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})}
  catch(_){return ''}
}
function fmtDate(s){
  if(!s) return '';
  try{
    const d=new Date(s+'T12:00:00');
    return d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
  }catch(_){return s}
}

/* ══════════════════════════════════════
   Sparkline
══════════════════════════════════════ */
async function loadSparkline(tid, el){
  if(el.dataset.loaded) return;
  el.dataset.loaded='1';
  try{
    const r=await fetch(API_BASE+'/api/history?tid='+encodeURIComponent(tid));
    const data=await r.json();
    const pts=(data.points||[]);
    if(pts.length<2) return;
    const prices=pts.map(p=>p.price);
    const min=Math.min(...prices), max=Math.max(...prices);
    const W=100, H=28;
    const coords=prices.map((p,i)=>{
      const x=(i/(prices.length-1))*W;
      const y=max===min ? H/2 : H-((p-min)/(max-min))*(H-4)-2;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" class="sparkline-svg" preserveAspectRatio="none">
      <polyline points="${coords}" fill="none" stroke="var(--qc)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    </svg><div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);margin-top:1px">
      <span>$${min.toFixed(2)}</span><span>$${max.toFixed(2)}</span></div>`;
  }catch(_){}
}

function openAlertModal(tid, deal){
  _alertTid=tid;
  _alertDealData=deal;
  document.getElementById('alertItemTitle').textContent=deal.title;
  document.getElementById('alertEmail').value=localStorage.getItem('alertEmail')||'';
  const pf=parsePrice(deal.currentPrice);
  document.getElementById('alertTargetPrice').value=pf?(pf*0.9).toFixed(2):'';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlertModal(){
  document.getElementById('alertModal').classList.remove('open');
}
async function submitAlert(){
  const email=document.getElementById('alertEmail').value.trim();
  const target=parseFloat(document.getElementById('alertTargetPrice').value);
  if(!email||!target||target<=0){
    showToast('Enter a valid email and target price.');
    return;
  }
  localStorage.setItem('alertEmail',email);
  const d=_alertDealData||{};
  try{
    const r=await fetch(API_BASE+'/api/alerts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tid:_alertTid,email,target_price:target,
        title:d.title||'',store:d.store||'',link:d.link||''})
    });
    if(r.ok){ closeAlertModal(); showToast('Alert set! We\'ll email you when the price drops.'); }
    else showToast('Could not save alert. Try again.');
  }catch(_){ showToast('Could not save alert. Check connection.'); }
}

function setProvince(prov){
  activeProvince=prov;
  localStorage.setItem('province', prov);
  document.querySelectorAll('.provbtn').forEach(b=>{
    b.className='provbtn';
    if(b.dataset.prov===prov)
      b.classList.add(prov==='QC'?'active-qc':prov==='ON'?'active-on':'active-both');
  });
  // Rebuild sidebar store counts for the selected province
  const provDeals = prov==='both' ? allDeals
    : allDeals.filter(d=>(d.provinces||['QC','ON']).includes(prov));
  const provCounts = {};
  provDeals.forEach(d=>{ const s=d.store.trim(); provCounts[s]=(provCounts[s]||0)+1; });
  // Merge into cumulative (never reduce counts below what province shows)
  const displayCounts = {};
  for(const [s,c] of Object.entries(provCounts)) displayCounts[s]=c;
  buildStoreList(displayCounts);
  shown=pageSize===0?Infinity:pageSize;
  applyFilters();
}

/* ══════════════════════════════════════
   Autocomplete
══════════════════════════════════════ */
let _acIndex=[];
function buildAutocomplete(){
  const stores=new Set();
  const brands=new Set();
  allDeals.forEach(d=>{
    if(d.store) stores.add(d.store.trim());
    if(d.brand && d.brand.length>1) brands.add(d.brand.trim());
  });
  _acIndex=[
    ...[...stores].map(s=>({label:s,type:'Store'})),
    ...[...brands].slice(0,120).map(b=>({label:b,type:'Brand'})),
  ];
}

function showAutocomplete(q){
  const dd=document.getElementById('searchDropdown');
  const inp=document.getElementById('searchInput');
  if(!q||q.length<2){
    dd.classList.remove('open'); dd.innerHTML='';
    inp.classList.remove('dropdown-open');
    return;
  }
  const ql=q.toLowerCase();
  const hits=_acIndex.filter(x=>x.label.toLowerCase().includes(ql)).slice(0,7);
  if(!hits.length){
    dd.classList.remove('open'); dd.innerHTML='';
    inp.classList.remove('dropdown-open');
    return;
  }
  dd.innerHTML=hits.map(h=>`<div class="sdrop-item" data-val="${esc(h.label)}">
    <span class="sdrop-icon">${h.type==='Store'?'🏪':'🏷'}</span>
    <span class="sdrop-label">${esc(h.label)}</span>
    <span class="sdrop-type">${esc(h.type)}</span>
  </div>`).join('');
  dd.classList.add('open');
  inp.classList.add('dropdown-open');
}

/* ══════════════════════════════════════
   Event wiring
══════════════════════════════════════ */
const searchInput=document.getElementById('searchInput');
const searchDropdown=document.getElementById('searchDropdown');

searchInput.addEventListener('input',e=>{
  searchQ=e.target.value;
  shown=pageSize===0?Infinity:pageSize;
  showAutocomplete(searchQ);
  applyFilters();
});
searchInput.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    searchDropdown.classList.remove('open');
    searchDropdown.innerHTML='';
    searchInput.classList.remove('dropdown-open');
  }
});
searchDropdown.addEventListener('click',e=>{
  const item=e.target.closest('.sdrop-item');
  if(!item) return;
  const val=item.dataset.val;
  searchInput.value=val;
  searchQ=val;
  searchDropdown.classList.remove('open');
  searchDropdown.innerHTML='';
  searchInput.classList.remove('dropdown-open');
  shown=pageSize===0?Infinity:pageSize;
  applyFilters();
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')){
    searchDropdown.classList.remove('open');
    searchInput.classList.remove('dropdown-open');
  }
});

document.getElementById('catFilters').addEventListener('click',e=>{
  const btn=e.target.closest('.fbtn');
  if(!btn) return;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=btn.dataset.cat;
  // Clear new badge when user views new deals
  if(activeCat==='new'){ newTidSet.clear(); updateNewBtn(); }
  // Persist cat (but not ephemeral tabs)
  if(activeCat!=='new') localStorage.setItem('activeCat', activeCat);
  shown=pageSize===0?Infinity:pageSize;
  applyFilters();
});

document.querySelectorAll('.provbtn').forEach(b=>{
  b.addEventListener('click',()=>setProvince(b.dataset.prov));
});

document.querySelectorAll('[data-sort]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    sortBy=b.dataset.sort;
    localStorage.setItem('sortBy', sortBy);
    applyFilters();
  });
});

document.querySelectorAll('[data-pg]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-pg]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    pageSize=parseInt(b.dataset.pg)||0;
    localStorage.setItem('pageSize', pageSize);
    shown=pageSize===0?Infinity:pageSize;
    applyFilters();
  });
});

// Event delegation for heart/alert/sparkline on deal cards
document.getElementById('root').addEventListener('click',e=>{
  const hb=e.target.closest('.heart-btn');
  if(hb){ e.stopPropagation(); toggleSave(hb.dataset.tid); return; }
  const ab=e.target.closest('.alert-btn');
  if(ab){
    e.stopPropagation();
    const deal=allDeals.find(d=>d.tid===ab.dataset.tid);
    if(deal) openAlertModal(ab.dataset.tid, deal);
    return;
  }
});
document.getElementById('root').addEventListener('mouseover',e=>{
  const wrap=e.target.closest('.sparkline-wrap');
  if(wrap && !wrap.dataset.loaded) loadSparkline(wrap.dataset.tid, wrap);
});
// Close alert modal on backdrop click
document.getElementById('alertModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('alertModal')) closeAlertModal();
});

/* ══════════════════════════════════════
   Boot
══════════════════════════════════════ */
// Dark mode
applyDark();

// Restore persisted sort button
document.querySelectorAll('[data-sort]').forEach(b=>{
  b.classList.toggle('active', b.dataset.sort===sortBy);
});

// Restore persisted page-size button
document.querySelectorAll('[data-pg]').forEach(b=>{
  const pg=parseInt(b.dataset.pg)||0;
  b.classList.toggle('active', pg===pageSize);
});

// Restore persisted category tab
setActiveCatBtn(activeCat);

// Apply saved province preference
setProvince(activeProvince);

// Show initial saved count
updateSavedCount();

// Register PWA service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
}

loadDeals();
connectSSE();
</script>
</body>
</html>
